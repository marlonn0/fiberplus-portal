<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Herramientas | Portal FiberPlus</title>
  <link rel="stylesheet" href="../css/formulario.css" />
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="hero-header">
        <div class="hero-logo-card"><img src="../assets/img/logo-fiberplus.png" alt="FiberPlus" class="hero-logo" onerror="this.style.display='none'; alert('Error en la imagen');"></div>
        <div class="hero-title-block">
          <span class="hero-label">FiberPlus</span>
          <h1 class="hero-title">Libro Diario de Instalaciones</h1>
          <p class="hero-description">Registro técnico y operativo de actividades en campo.</p>
        </div>
      </div>
    </header>

    <nav class="nav-wrapper">
      <div class="nav-container">
        <a href="1_datos.html" class="nav-item"><i class="fas fa-clipboard-list"></i> <span>Datos</span></a>
        <a href="2_cables.html" class="nav-item"><i class="fas fa-plug"></i> <span>Cables</span></a>
        <a href="3_materiales.html" class="nav-item"><i class="fas fa-boxes"></i> <span>Materiales</span></a>
        <a href="4_herramientas.html" class="nav-item active"><i class="fas fa-tools"></i> <span>Herramientas</span></a>
        <a href="5_enviar.html" class="nav-item"><i class="fas fa-paper-plane"></i> <span>Enviar</span></a>
      </div>
    </nav>

    <section id="herramientas" class="card glass-card">
      <div class="section-header">
        <div class="header-left">
          <div class="header-icon"><i class="fas fa-toolbox"></i></div>
          <div><h2>Herramientas empleadas</h2><p class="subtle">Registra el grupo, la herramienta y la cantidad</p></div>
        </div>
        <span class="badge" style="background: #e0f2fe; color: #0284c7; border: 1px solid #bae6fd;">Opcional</span>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label><i class="fas fa-layer-group"></i> Grupo de herramientas</label>
          <select id="toolGroup" class="form-input" onchange="handleToolGroupChange()">
            <option value="">Seleccione el grupo...</option>
            <option>EPP y seguridad</option><option>Ropa de trabajo</option><option>Herramientas manuales</option>
            <option>Herramientas de corte</option><option>Herramientas de medición</option><option>Herramientas eléctricas</option>
            <option>Equipos de fibra óptica</option><option>Equipos de apoyo en campo</option><option>Señalización y trabajo en vía</option>
            <option>Oficina y apoyo administrativo</option>
          </select>
        </div>
        <div class="form-group"><label><i class="fas fa-tools"></i> Herramienta específica</label><select id="toolName" class="form-input" onchange="mostrarCampoOtraHerramienta()"><option value="">Primero selecciona el grupo...</option></select></div>
        <div class="form-group" id="divOtraHerramienta" style="display: none;"><label><i class="fas fa-pen"></i> Especificar herramienta</label><input id="otraHerramienta" type="text" placeholder="Escriba la herramienta" class="form-input" /></div>
        <div class="form-group"><label><i class="fas fa-hashtag"></i> Cantidad</label><input id="toolQty" type="number" min="1" step="1" placeholder="Ej: 2" class="form-input" /></div>
        <div class="form-group full-width"><label><i class="fas fa-comment-dots"></i> Observación (Opcional)</label><input id="toolObs" type="text" placeholder="Detalle adicional" class="form-input" /></div>
      </div>
      <button class="btn-add" onclick="addTool()"><i class="fas fa-plus-circle"></i> Agregar herramienta a la lista</button>

      <div id="tool-list" class="list-container"></div>

      <div style="display: flex; gap: 15px; margin-top: 40px; padding-top: 30px; border-top: 2px solid var(--border-color); flex-wrap: wrap;">
        <button class="btn-secondary" onclick="window.location.href='3_materiales.html'" style="flex: 0 1 auto; padding: 15px 25px;"><i class="fas fa-arrow-left"></i> Paso Anterior</button>
        <button class="btn-add" onclick="window.location.href='5_enviar.html'" style="margin-top: 0; flex: 1; font-size: 1.15rem;">SIGUIENTE PASO <i class="fas fa-arrow-right"></i></button>
      </div>
    </section>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
