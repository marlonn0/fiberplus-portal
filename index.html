<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema | Portal Fiberplus</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <img src="assets/img/logo-fiberplus.png" alt="Fiberplus" class="logo">
                <h2>PORTAL OPERATIVO</h2>
                <p>Ingresa tus credenciales para acceder al sistema</p>
            </div>
            
            <form id="formLoginReal" class="form-login">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Correo electrónico corporativo" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                
                <p id="errorMsg" class="error-msg" style="display: none;">Credenciales incorrectas o usuario no registrado.</p>
                
                <button type="submit" class="btn-submit">INICIAR SESIÓN</button>
            </form>
            
            <div class="login-footer">
                <p>¿Problemas para ingresar? <a href="#">Contactar a Soporte TI</a></p>
            </div>
        </div>
    </div>

    <script>
        // Lógica temporal para que el botón funcione y te lleve al Dashboard.
        // En el próximo paso, borraremos esto y conectaremos Firebase aquí.
        document.getElementById('formLoginReal').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // Usuario de prueba temporal: admin@fiberplus.com.ec / 123456
            if(email === 'admin@fiberplus.com.ec' && pass === '123456') {
                window.location.href = "pages/dashboard.html";
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
